project_name: "opening_video_first_demo"
mode: "video-first"
duration: 15
aspect_ratio: "21:9"
output_format: "webm"

video:
  i2v_model:
    family: "wan2.2"
    variant: "i2v"
    format: "safetensors"
    path_high: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/diffusion_models/wan2.2/DasiwaWAN22I2V14BLightspeed_synthseductionHighV9.safetensors"
    path_low: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/diffusion_models/wan2.2/DasiwaWAN22I2V14BLightspeed_synthseductionLowV9.safetensors"
    profile: "DasiwaWAN22I2V14BLightspeed_synthseductionV9"
    runtime_backend: "comfyui"
  bundle:
    vae:
      path: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/vae/Wan2_1_VAE_fp32.safetensors"
      format: "safetensors"
    text_encoders:
      primary:
        path: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/text_encoders/umt5_xxl_fp16.safetensors"
        format: "safetensors"
      secondary:
        path: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/text_encoders/umt5_xxl_fp8_e4m3fn_scaled.safetensors"
        format: "safetensors"
    clip_vision:
      path: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/clip_vision/clip_vision_h.safetensors"
      format: "safetensors"
  s2v_model:
    family: "wan2.2"
    variant: "s2v"
    format: "gguf"
    path_high: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/diffusion_models/wan2.2/DasiwaWAN22I2V14BTastysinV8_q8High.gguf"
    path_low: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/diffusion_models/wan2.2/DasiwaWAN22I2V14BTastysinV8_q8Low.gguf"
    profile: "DasiwaWAN22I2V14BTastysinV8_q8"
    runtime_backend: "comfyui"
  chain_strategy: "last_frame"
  use_svi_lora: true
  svi_lora:
    path_high: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/loras/wan_svi/SVI_v2_PRO_Wan2.2-I2V-A14B_HIGH_lora_rank_128_fp16.safetensors"
    path_low: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/loras/wan_svi/SVI_v2_PRO_Wan2.2-I2V-A14B_LOW_lora_rank_128_fp16.safetensors"
    strength: 0.8
  generation:
    fps: 24
    base_resolution:
      width: 1344
      height: 576
    guidance_scale: 6.0
    steps: 30
    negative_prompt: "low quality, blurry, deformed, bad anatomy, flicker"
  acceleration:
    attention_backend: "sageattention"
    sageattention_enabled: true
    sageattention_required: false
    fallback_attention: "sdpa"
    require_cuda: true
  extension:
    enabled: true
    max_extension_seconds_per_shot: 3.0
    source_mode: "last_frame"
    custom_image: ""
    apply_when:
      - "hold"
      - "music_gap"

audio:
  engine: "ace-step"
  bundle:
    diffusion_model:
      path: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/diffusion_models/acestep_v1.5_turbo.safetensors"
      format: "safetensors"
      profile: "acestep_v1.5_turbo"
    text_encoders:
      clip_file_1: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/text_encoders/qwen_0.6b_ace15.safetensors"
      clip_file_2: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/text_encoders/qwen_4b_ace15.safetensors"
      type: "ace"
    vae:
      path: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/vae/ace_1.5_vae.safetensors"
      format: "safetensors"
  generation_mode: "from_video_plan"
  output_mode: "instrumental_plus_vocal"
  prompt: "cinematic anime opening song, emotional build, bright chorus, strong ending hit"
  instrumental:
    enabled: true
  vocal:
    enabled: true
    lyrics_mode: "manual"
    lyrics_path: "./assets/lyrics/opening_theme.txt"
    style_prompt: "youthful female anime vocal, clear lead, emotional chorus"
  voice_clone:
    enabled: true
    clone_id: "heroine_v1"
    reference_audio_dir: "./voices/heroine_v1"
    mix_mode: "separate_stems"

inputs:
  source_images:
    - "./assets/images/opening_scene_01.png"
    - "./assets/images/opening_scene_02.png"
  reference_images:
    - "./assets/images/character_reference_group.png"
  text_prompt: "anime opening, hero and rival in the rain, neon reflections, dramatic camera movement, emotional buildup"
  title:
    text: "PROJECT AOG"
    overlay_enabled: true
    timing_seconds: 11.8

planning:
  shot_template: "dramatic_team_intro"
  target_shot_count: 5
  shot_duration_range:
    min: 2.0
    max: 4.5
  energy_curve:
    - "low"
    - "mid"
    - "mid_high"
    - "high"
  allow_s2v_extension: true
  quality_profile: "high_low_pair"

postprocess:
  upscale:
    enabled: true
    model_path: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/models/upscale_models/4x-UltraSharpV2.safetensors"
    model_format: "safetensors"
    scale: 4
    apply_to: "final_video_frames"
    fallback_method: "lanczos"
  frame_interpolation:
    enabled: true
    engine: "rife"
    model_path: "/mnt/d/Stable Diffusion/StabilityMatrix-win-x64/Data/Packages/ComfyUI/custom_nodes/ComfyUI-VFI/rife/train_log/flownet.pkl"
    target_fps: 48
    apply_after_upscale: false
    multiplier: 2

output:
  dir: "/mnt/d/Stable Diffusion/aog/opening_video_first_demo"
  save_intermediate_shots: true
  save_last_frames: true
  save_music_plan: true
  save_stems: true
  export:
    video_codec: "libvpx-vp9"
    audio_codec: "libopus"
    pixel_format: "yuv420p"
